 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMP Mogador - Enquête des pêcheurs</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="overlay">
        <h1>🌊 AMP MOGADOR</h1>
        <p>Questionnaire destiné aux pêcheurs artisanaux</p>
    </div>
</header>

<div class="container">

    <form action="save.php" method="POST">

<section>
    <h2>Informations personnelles</h2>

    <label>Âge</label>
    <input type="number" name="age">

    <label>Site d'activité</label>
    <input type="text" name="site_activite">

    <label>Niveau d'éducation</label>
    <select name="niveau_education">
        <option value="Analphabète">Analphabète</option>
        <option value="Coranique">Coranique</option>
        <option value="Primaire">Primaire</option>
        <option value="Secondaire / Bac">Secondaire / Bac</option>
        <option value="Universitaire">Universitaire</option>
    </select>

    <label>Situation familiale</label>
    <select name="situation_familiale">
        <option value="Célibataire">Célibataire</option>
        <option value="Marié">Marié</option>
        <option value="Divorcé">Divorcé</option>
    </select>
</section>
<section>

    <h2>Activité de pêche</h2>

    <label>Depuis combien de temps pratiquez-vous la pêche ?</label>
    <input type="text" name="experience_peche">

    <label>Comment avez-vous appris le métier ?</label>
    <select name="apprentissage">
        <option value="Parents">Parents</option>
        <option value="Expérience">Expérience</option>
        <option value="Formation professionnelle">Formation professionnelle</option>
    </select>

    <label>Type de pêche</label>
    <select name="type_peche">
        <option value="Artisanale">Artisanale</option>
        <option value="Côtière">Côtière</option>
    </select>

    <label>Propriétaire de barque ?</label>
    <select name="proprietaire_barque">
        <option value="Oui">Oui</option>
        <option value="Non">Non</option>
    </select>

    <label>Revenu moyen par jour (DH)</label>
    <input type="number" name="revenu_jour">

    <label>Revenu moyen par mois (DH)</label>
    <input type="number" name="revenu_mois">

    <label>Nombre de jours de pêche par semaine</label>
    <input type="number" name="jours_semaine">

    <label>Durée moyenne d'une marée</label>
    <input type="text" name="duree_maree">

    <label>Lieu principal de pêche</label>
    <select name="lieu_peche">
        <option value="SSW">SSW</option>
        <option value="SW">SW</option>
        <option value="W">W</option>
        <option value="NW">NW</option>
    </select>

</section>
<section>
<h2>Débarquement de peche</h2>
<label>Especes pechées</label>
<div class="checkbox-group">

<label>
<input type="checkbox" name="cephalopodes" value="Oui">
Céphalopodes
</label>

<label>
<input type="checkbox" name="poissons_demersaux" value="Oui">
Poissons démersaux
</label>

<label>
<input type="checkbox" name="elasmobranches" value="Oui">
Élasmobranches
</label>

<label>
<input type="checkbox" name="poissons_pelagiques" value="Oui">
Poissons pélagiques
</label>

<label>
<input type="checkbox" name="crustaces" value="Oui">
Crustacés
</label>

</div> 
    
    <label>Taille Dominant :</label>
<select name="taille_dominante">
    <option value="Grande">Grande</option>
    <option value="Petite">Petite</option>
</select>
    <label>Qantités pechées lors de chaque marée:</label>
<select name="quantite_moyenne">
    <option value="Moins de 40 Kg">Moins de 40 Kg</option>
    <option value="Plus de 40 Kg">Plus de 40 Kg</option>
    <option value="Non mesurée">Non mesurée</option>
</select>
<label>état des ressources halieutique :</label>
<select name="etat_ressources">
    <option value="Stable">Stable</option>
    <option value="En amélioration">En amélioration</option>
    <option value="En dégradation">En dégradation</option>
</select>
    <label></label>
<select name="prix_criee">
    <option value="Faible">Faible</option>
    <option value="Moyen">Moyen</option>
    <option value="Élevé">Élevé</option>
</select>
    <label></label>
<select name="evolution_prix">
    <option value="En baisse">En baisse</option>
    <option value="Stable">Stable</option>
    <option value="En hausse">En hausse</option>
</select>
    <label></label>
<select name="satisfaction">
    <option value="Peu satisfait">Peu satisfait</option>
    <option value="Moyennement satisfait">Moyennement satisfait</option>
    <option value="Totalement satisfait">Totalement satisfait</option>
</select>
    <label></label>
<select name="connait_amp">
    <option value="Oui">Oui</option>
    <option value="Non">Non</option>
</select>
    <label></label>
<select name="impact_quantite">
    <option value="Positif">Positif</option>
    <option value="Négatif">Négatif</option>
    <option value="Ne sait pas">Ne sait pas</option>
</select>
    <label></label>
<select name="impact_socio">
    <option value="Positif">Positif</option>
    <option value="Négatif">Négatif</option>
    <option value="Neutre">Neutre</option>
</select>
</section>
<label>Commentaire</label>
<textarea name="commentaire" rows="5"></textarea>

<button type="submit">
    Envoyer le questionnaire
</button>
